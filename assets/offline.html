<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blogs Are Back — Offline</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --bg-raised: #1a1a1a;
        --bg-hover: #242424;
        --text: #e0e0e0;
        --text-secondary: #888;
        --text-tertiary: #666;
        --border: #2a2a2a;
        --accent: #6b8afd;
        --accent-hover: #8aa2ff;
        --scrollbar-track: #1a1a1a;
        --scrollbar-thumb: #333;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f5f5;
          --bg-raised: #ffffff;
          --bg-hover: #ebebeb;
          --text: #1a1a1a;
          --text-secondary: #666;
          --text-tertiary: #999;
          --border: #ddd;
          --accent: #4a6ae8;
          --accent-hover: #3a56c4;
          --scrollbar-track: #eee;
          --scrollbar-thumb: #ccc;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        user-select: none;
        overflow: hidden;
      }

      .titlebar {
        -webkit-app-region: drag;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        z-index: 100;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding-top: 52px;
      }

      /* ── Status banner ── */

      .status-bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-raised);
      }

      .status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #e8813a;
        flex-shrink: 0;
      }

      .retry-btn {
        -webkit-app-region: no-drag;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        font-family: inherit;
        font-size: 12px;
        padding: 5px 14px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }

      .retry-btn:hover {
        background: var(--bg-hover);
        color: var(--text);
        border-color: var(--text-tertiary);
      }

      /* ── List view ── */

      .view {
        display: none;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      .view.active {
        display: flex;
      }

      .list-header {
        flex-shrink: 0;
        padding: 20px 20px 12px;
      }

      .list-header h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }

      .list-header p {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 4px;
      }

      .post-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 20px 20px;
      }

      .post-list::-webkit-scrollbar {
        width: 6px;
      }

      .post-list::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
      }

      .post-list::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 3px;
      }

      .post-card {
        -webkit-app-region: no-drag;
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .post-card:hover {
        background: var(--bg-hover);
        border-color: var(--text-tertiary);
      }

      .post-card-title {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 6px;
        color: var(--text);
      }

      .post-card-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      .post-card-meta .separator {
        color: var(--text-tertiary);
      }

      .post-card-blog-icon {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        vertical-align: middle;
        flex-shrink: 0;
      }

      .post-card-desc {
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-secondary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── Empty state ── */

      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 40px 20px;
        text-align: center;
      }

      .empty-state-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--bg-raised);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .empty-state-icon svg {
        width: 24px;
        height: 24px;
        stroke: var(--text-tertiary);
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .empty-state h2 {
        font-size: 16px;
        font-weight: 600;
      }

      .empty-state p {
        font-size: 13px;
        color: var(--text-secondary);
        max-width: 280px;
        line-height: 1.5;
      }

      /* ── Reader view ── */

      .reader-toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }

      .back-btn {
        -webkit-app-region: no-drag;
        display: flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        font-family: inherit;
        font-size: 13px;
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
        flex-shrink: 0;
      }

      .back-btn:hover {
        background: var(--bg-hover);
        color: var(--text);
        border-color: var(--text-tertiary);
      }

      .back-btn svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .reader-toolbar-title {
        font-size: 13px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .reader-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 32px 20px 48px;
      }

      .reader-scroll::-webkit-scrollbar {
        width: 6px;
      }

      .reader-scroll::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
      }

      .reader-scroll::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 3px;
      }

      .reader-header {
        max-width: 640px;
        margin: 0 auto 28px;
      }

      .reader-header h1 {
        font-size: 26px;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: -0.4px;
        margin-bottom: 12px;
      }

      .reader-header-meta {
        font-size: 13px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .reader-header-meta .separator {
        color: var(--text-tertiary);
      }

      .reader-content {
        max-width: 640px;
        margin: 0 auto;
        font-size: 16px;
        line-height: 1.7;
        color: var(--text);
        user-select: text;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      .reader-content h1,
      .reader-content h2,
      .reader-content h3,
      .reader-content h4,
      .reader-content h5,
      .reader-content h6 {
        margin-top: 1.6em;
        margin-bottom: 0.6em;
        font-weight: 600;
        line-height: 1.3;
      }

      .reader-content h1 { font-size: 1.5em; }
      .reader-content h2 { font-size: 1.3em; }
      .reader-content h3 { font-size: 1.15em; }

      .reader-content p {
        margin-bottom: 1em;
      }

      .reader-content a {
        color: var(--accent);
        text-decoration: none;
      }

      .reader-content a:hover {
        text-decoration: underline;
      }

      .reader-content img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        margin: 1em 0;
      }

      .reader-content blockquote {
        border-left: 3px solid var(--border);
        padding-left: 16px;
        margin: 1em 0;
        color: var(--text-secondary);
        font-style: italic;
      }

      .reader-content pre {
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 16px;
        overflow-x: auto;
        margin: 1em 0;
        font-size: 14px;
        line-height: 1.5;
      }

      .reader-content code {
        background: var(--bg-raised);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
      }

      .reader-content pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: inherit;
      }

      .reader-content ul,
      .reader-content ol {
        margin: 1em 0;
        padding-left: 1.5em;
      }

      .reader-content li {
        margin-bottom: 0.4em;
      }

      .reader-content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2em 0;
      }

      .reader-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
      }

      .reader-content th,
      .reader-content td {
        border: 1px solid var(--border);
        padding: 8px 12px;
        text-align: left;
      }

      .reader-content th {
        background: var(--bg-raised);
        font-weight: 600;
      }

      /* ── Loading spinner for reader ── */

      .reader-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
      }

      .reader-loading .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid var(--border);
        border-top-color: var(--text-secondary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="titlebar"></div>

    <div class="app">
      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>You are offline</span>
        </div>
        <button class="retry-btn" onclick="retryDashboard()">Go to Dashboard</button>
      </div>

      <!-- List view -->
      <div id="list-view" class="view active">
        <div class="list-header">
          <h1>Saved Posts</h1>
          <p>Read posts you have saved for offline access.</p>
        </div>

        <div id="empty-state" class="empty-state" style="display: none;">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
          </div>
          <h2>No saved posts yet</h2>
          <p>When you save posts for offline reading, they will appear here.</p>
        </div>

        <div id="post-list" class="post-list"></div>
      </div>

      <!-- Reader view -->
      <div id="reader-view" class="view">
        <div class="reader-toolbar">
          <button class="back-btn" id="back-btn">
            <svg viewBox="0 0 24 24">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
          </button>
          <span class="reader-toolbar-title" id="reader-toolbar-title"></span>
        </div>
        <div class="reader-scroll">
          <div class="reader-header" id="reader-header">
            <h1 id="reader-title"></h1>
            <div class="reader-header-meta" id="reader-meta"></div>
          </div>
          <div class="reader-content" id="reader-content"></div>
        </div>
      </div>
    </div>

    <script>
      function retryDashboard() {
        if (window.electronBridge) {
          window.electronBridge.invoke('RETRY_DASHBOARD');
        }
      }

      (function () {
        var posts = [];

        var listView = document.getElementById('list-view');
        var readerView = document.getElementById('reader-view');
        var postList = document.getElementById('post-list');
        var emptyState = document.getElementById('empty-state');
        var backBtn = document.getElementById('back-btn');
        var readerTitle = document.getElementById('reader-title');
        var readerMeta = document.getElementById('reader-meta');
        var readerContent = document.getElementById('reader-content');
        var readerToolbarTitle = document.getElementById('reader-toolbar-title');

        function showView(name) {
          listView.classList.toggle('active', name === 'list');
          readerView.classList.toggle('active', name === 'reader');
          if (name === 'reader') {
            readerView.querySelector('.reader-scroll').scrollTop = 0;
          }
        }

        function stripHtml(html) {
          var tmp = document.createElement('div');
          tmp.innerHTML = html || '';
          var text = tmp.textContent || tmp.innerText || '';
          return text.replace(/\s+/g, ' ').trim();
        }

        function truncate(str, len) {
          if (!str) return '';
          if (str.length <= len) return str;
          return str.substring(0, len).trimEnd() + '...';
        }

        function formatDate(dateStr) {
          if (!dateStr) return '';
          try {
            var d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleDateString(undefined, {
              month: 'short',
              day: 'numeric',
              year: 'numeric'
            });
          } catch (e) {
            return '';
          }
        }

        function escapeHtml(str) {
          var div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }

        function renderPostList() {
          if (posts.length === 0) {
            postList.style.display = 'none';
            emptyState.style.display = 'flex';
            return;
          }

          postList.style.display = 'block';
          emptyState.style.display = 'none';

          var html = '';
          for (var i = 0; i < posts.length; i++) {
            var post = posts[i];
            var desc = truncate(stripHtml(post.description), 100);
            var savedDate = formatDate(post.savedAt);
            var pubDate = formatDate(post.pubDate);
            var displayDate = savedDate ? 'Saved ' + savedDate : (pubDate || '');

            html += '<div class="post-card" data-index="' + i + '">';
            html += '<div class="post-card-title">' + escapeHtml(post.title || 'Untitled') + '</div>';
            html += '<div class="post-card-meta">';
            if (post.blogIcon) {
              html += '<img class="post-card-blog-icon" src="' + escapeHtml(post.blogIcon) + '" alt="" onerror="this.style.display=\'none\'">';
            }
            html += '<span>' + escapeHtml(post.blogTitle || post.author || 'Unknown') + '</span>';
            if (displayDate) {
              html += '<span class="separator">/</span>';
              html += '<span>' + escapeHtml(displayDate) + '</span>';
            }
            html += '</div>';
            if (desc) {
              html += '<div class="post-card-desc">' + escapeHtml(desc) + '</div>';
            }
            html += '</div>';
          }

          postList.innerHTML = html;

          var cards = postList.querySelectorAll('.post-card');
          for (var j = 0; j < cards.length; j++) {
            cards[j].addEventListener('click', onCardClick);
          }
        }

        function onCardClick(e) {
          var card = e.currentTarget;
          var index = parseInt(card.getAttribute('data-index'), 10);
          var post = posts[index];
          if (post) {
            openReader(post);
          }
        }

        function openReader(post) {
          var pubDate = formatDate(post.pubDate);

          readerTitle.textContent = post.title || 'Untitled';
          readerToolbarTitle.textContent = post.title || 'Untitled';

          var metaHtml = '';
          metaHtml += '<span>' + escapeHtml(post.blogTitle || post.author || 'Unknown') + '</span>';
          if (pubDate) {
            metaHtml += '<span class="separator">/</span>';
            metaHtml += '<span>' + escapeHtml(pubDate) + '</span>';
          }
          readerMeta.innerHTML = metaHtml;

          readerContent.innerHTML = '<div class="reader-loading"><div class="spinner"></div></div>';

          showView('reader');

          window.electronBridge.invoke('GET_SAVED_POST_CONTENT', { guid: post.guid })
            .then(function (response) {
              var content = response.data || '';
              if (!content) {
                readerContent.innerHTML = '<p style="color: var(--text-secondary);">No content available for this post.</p>';
              } else {
                readerContent.innerHTML = content;
              }
            })
            .catch(function () {
              readerContent.innerHTML = '<p style="color: var(--text-secondary);">Failed to load post content.</p>';
            });
        }

        backBtn.addEventListener('click', function () {
          showView('list');
        });

        function loadPosts() {
          window.electronBridge.invoke('GET_SAVED_POSTS_INDEX')
            .then(function (response) {
              posts = response.data || [];
              posts.sort(function (a, b) {
                var da = new Date(a.savedAt || 0).getTime();
                var db = new Date(b.savedAt || 0).getTime();
                return db - da;
              });
              renderPostList();
            })
            .catch(function () {
              posts = [];
              renderPostList();
            });
        }

        // Listen for network status changes — auto-navigate to dashboard when back online
        if (window.electronBridge && typeof window.electronBridge.onNetworkStatusChanged === 'function') {
          window.electronBridge.onNetworkStatusChanged(function (status) {
            if (status === 'online' || (status && status.status === 'online')) {
              retryDashboard();
            }
          });
        }

        // Initial load
        loadPosts();
      })();
    </script>
  </body>
</html>
